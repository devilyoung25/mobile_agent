[project]
name = "on-capability-gateway"
version = "0.1.0"
description = "Capability Gateway: governs tools resolved through backing adapters (MCP today)"
requires-python = ">=3.11"
dependencies = [
    "langchain-core>=1.0.0",
    "langchain-mcp-adapters>=0.2.2",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["capability_gateway"]
