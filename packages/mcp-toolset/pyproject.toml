[project]
name = "on-mcp-toolset"
version = "0.1.0"
description = "Generic capability provider over any MCP server, with allow/deny tool policy"
requires-python = ">=3.11"
dependencies = [
    "langchain-core>=1.0.0",
    "langchain-mcp-adapters>=0.2.2",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["mcp_toolset"]
