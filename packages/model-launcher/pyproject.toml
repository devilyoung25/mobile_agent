[project]
name = "on-model-launcher"
version = "0.1.0"
description = "Brand-independent model launcher: registry + chat-model construction"
requires-python = ">=3.11"
dependencies = [
    "langchain>=1.3.4",
    "langchain-openai>=1.2.2",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["model_launcher"]
